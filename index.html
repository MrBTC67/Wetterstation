<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetterstation Klaus</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --color-dry: #00bcd4; --color-light: #ffeb3b; --color-mod: #ff9800; 
            --color-heavy: #f44336; --color-extreme: #9c27b0; 
        }
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 5px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 8px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 0 5px; }
        .controls label { font-size: 0.85em; color: #aaa; }
        select { background: #2a2a2a; color: white; border: 1px solid #444; padding: 6px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .card { padding: 8px 4px; background: #2a2a2a; border-radius: 8px; border-top: 3px solid #00d1b2; transition: all 0.5s ease; }
        .card h3 { margin: 0 0 4px 0; font-size: 0.6em; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        .val-display { font-size: 1.05em; font-weight: bold; white-space: nowrap; }
        
        .hum-text { color: #3273dc; }
        .pres-text { color: #a29bfe; }
        .rain-text { color: var(--color-dry); }
        .max-text { color: #ff3860; }
        .min-text { color: #ffdd57; }
        
        .card.hum { border-top-color: #3273dc; }
        .card.pres { border-top-color: #a29bfe; }
        .card.rain { border-top-color: var(--color-dry); }
        .card.max { border-top-color: #ff3860; }
        .card.min { border-top-color: #ffdd57; }

        .chart-box { background: #2a2a2a; border-radius: 10px; padding: 12px 10px 40px 10px; margin-bottom: 10px; border: 1px solid #333; height: 300px; box-sizing: border-box; }
        
        @media (min-width: 600px) {
            body { padding: 15px; }
            .container { padding: 20px; }
            .stats { gap: 15px; }
            .card { padding: 15px; border-top: 0; border-left: 5px solid #00d1b2; text-align: left; }
            .card.hum { border-left-color: #3273dc; }
            .card.pres { border-left-color: #a29bfe; }
            .card.rain { border-left-color: var(--color-dry); }
            .card.max { border-left-color: #ff3860; }
            .card.min { border-left-color: #ffdd57; }
            .val-display { font-size: 1.6em; }
            .card h3 { font-size: 0.8em; }
            .chart-box { height: 350px; padding-bottom: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <label for="period">Zeitraum</label>
        <select id="period" onchange="fetchData()">
            <option value="12">1 Std</option>
            <option value="48">4 Std</option>
            <option value="144">12 Std</option>
            <option value="288" selected>24 Std</option>
            <option value="2016">7 Tage</option>
        </select>
    </div>

    <!-- Reihe 1: Hauptwerte -->
    <div class="stats">
        <div id="card-curr" class="card">
            <h3>Temperatur</h3>
            <div id="temp-display" class="val-display"><span id="curr-temp">--</span>°</div>
        </div>
        <div class="card hum">
            <h3>Feuchte</h3>
            <div class="val-display hum-text"><span id="curr-hum">--</span>%</div>
        </div>
        <div class="card rain" id="rainCard">
            <h3>Gesamt Regenmenge</h3>
            <div class="val-display rain-text" id="curr-rain">--</div>
        </div>
    </div>

    <!-- Reihe 2: Sekundärwerte -->
    <div class="stats">
        <div class="card pres">
            <h3>Luftdruck</h3>
            <div class="val-display pres-text"><span id="curr-pres">--</span></div>
        </div>
        <div class="card min">
            <h3>Min (24h)</h3>
            <div class="val-display min-text"><span id="min-temp-val">--</span>°</div>
        </div>
        <div class="card max">
            <h3>Max (24h)</h3>
            <div class="val-display max-text"><span id="max-temp-val">--</span>°</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="presChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="rainChart"></canvas>
    </div>
</div>

<script>
const URL_BASE = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app";
const URL_T = `${URL_BASE}/temperature.json`;
const URL_H = `${URL_BASE}/humidity.json`;
const URL_P = `${URL_BASE}/pressure.json`;
const URL_R_BASE = `${URL_BASE}/Regenmesser`;

let charts = {};

function getTimeFromId(id) {
    const PUSH_CHARS = "-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz";
    let time = 0;
    const data = id.substring(0, 8);
    for (let i = 0; i < data.length; i++) {
        time = time * 64 + PUSH_CHARS.indexOf(data.charAt(i));
    }
    return new Date(time);
}

function getTempColor(t) {
    if (t < 5) return '#00008B';
    if (t < 10) return '#40E0D0';
    if (t < 15) return '#006400';
    if (t < 20) return '#90EE90';
    if (t < 25) return '#FFA500';
    return '#FF0000';
}

function getColorByDiff(diff) {
    if (diff < 0.2) return '#00bcd4'; 
    const rate = diff * 60; 
    if (rate <= 15.0) return '#ffeb3b'; 
    if (rate <= 30.0) return '#ff9800'; 
    if (rate <= 45.0) return '#f44336'; 
    return '#9c27b0';                      
}

async function fetchData() {
    const period = parseInt(document.getElementById('period').value);
    const months = ["Januar", "Februar", "Maerz", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonthStr = months[now.getMonth()];

    try {
        const [resT, resH, resP, resR] = await Promise.all([
            fetch(URL_T), 
            fetch(URL_H), 
            fetch(URL_P),
            fetch(`${URL_R_BASE}/${currentYear}/${currentMonthStr}.json?orderBy="$key"&limitToLast=2000`)
        ]);

        const dataT = await resT.json();
        const dataH = await resH.json();
        const dataP = await resP.json();
        const dataR = await resR.json();

        // Standard Sensoren verarbeiten
        const processData = (data) => {
            if (!data) return [];
            let arr = Object.keys(data).map(key => ({
                id: key,
                date: getTimeFromId(key),
                value: data[key].value
            }));
            return period > 0 ? arr.slice(-period) : arr;
        };

        const entriesT = processData(dataT);
        const entriesH = processData(dataH);
        const entriesP = processData(dataP);

        // Regen verarbeiten
        let entriesR = [];
        if (dataR) {
            const keys = Object.keys(dataR).sort();
            entriesR = keys.map(k => {
                const e = dataR[k];
                const p = e.zeitstempel.split(/[. :]/);
                // Beachte: Index 3 ist Stunde, Index 4 Minute. Korrektur +1 falls nötig wie im Original
                return {
                    date: new Date(p[2], p[1]-1, p[0], p[3], p[4]),
                    value: parseFloat(e.regen_l_m2) || 0
                };
            });
            // Filtere Regen auf den Zeitraum (grob geschätzt über die letzten X Einträge oder Zeit)
            const cutoff = new Date(now.getTime() - (period * 5 * 60 * 1000)); // 5 Min Interval angenommen
            entriesR = entriesR.filter(e => e.date >= cutoff);
        }

        updateUI(entriesT, entriesH, entriesP, entriesR);
        
    } catch (e) { console.error("Datenfehler:", e); }
}

function updateUI(entriesT, entriesH, entriesP, entriesR) {
    // Aktuelle Werte & Farben
    if (entriesT.length > 0) {
        const lastT = entriesT[entriesT.length-1].value;
        const color = getTempColor(lastT);
        document.getElementById('curr-temp').innerText = lastT.toFixed(1);
        document.getElementById('temp-display').style.color = color;
        document.getElementById('card-curr').style.borderTopColor = color;
        
        const valsT = entriesT.map(e => e.value);
        document.getElementById('min-temp-val').innerText = Math.min(...valsT).toFixed(1);
        document.getElementById('max-temp-val').innerText = Math.max(...valsT).toFixed(1);
    }

    if (entriesH.length > 0) document.getElementById('curr-hum').innerText = entriesH[entriesH.length-1].value.toFixed(1);
    if (entriesP.length > 0) document.getElementById('curr-pres').innerText = entriesP[entriesP.length-1].value.toFixed(0);

    if (entriesR.length > 0) {
        const lastR = entriesR[entriesR.length-1].value;
        const prevR = entriesR.length > 1 ? entriesR[entriesR.length-2].value : lastR;
        const diff = lastR - prevR > 0 ? lastR - prevR : 0;
        const rainColor = getColorByDiff(diff);
        
        document.getElementById('curr-rain').innerText = lastR.toFixed(2) + " l/m²";
        document.getElementById('curr-rain').style.color = rainColor;
        document.getElementById('rainCard').style.borderTopColor = rainColor;
    }

    // Charts rendern
    renderMainChart(entriesT, entriesH);
    renderPresChart(entriesP);
    renderRainChart(entriesR);
}

function renderMainChart(entriesT, entriesH) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    const labels = entriesT.map(e => e.date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }));
    const valT = entriesT.map(e => e.value);
    const valH = entriesH.map(e => e.value);
    const color = valT.length > 0 ? getTempColor(valT[valT.length-1]) : '#00d1b2';

    const data = {
        labels,
        datasets: [
            { label: 'Temp', data: valT, borderColor: color, backgroundColor: color + '22', fill: true, yAxisID: 'y', pointRadius: 0, tension: 0.3 },
            { label: 'Feuchte', data: valH, borderColor: '#3273dc', yAxisID: 'y1', pointRadius: 0, tension: 0.3 }
        ]
    };

    if (charts['mainChart']) {
        charts['mainChart'].data = data;
        charts['mainChart'].update('none');
    } else {
        charts['mainChart'] = new Chart(ctx, {
            type: 'line', data,
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                plugins: { legend: { display: false }, title: { display: true, text: 'Temperatur & Feuchte', color: '#fff' } },
                scales: {
                    y: { type: 'linear', position: 'left', grid: { color: '#333' }, ticks: { color: '#bbb' } },
                    y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#3273dc' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#bbb', maxTicksLimit: 6 } }
                }
            }
        });
    }
}

function renderPresChart(entriesP) {
    const ctx = document.getElementById('presChart').getContext('2d');
    const labels = entriesP.map(e => e.date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }));
    const values = entriesP.map(e => e.value);

    if (charts['presChart']) {
        charts['presChart'].data.labels = labels;
        charts['presChart'].data.datasets[0].data = values;
        charts['presChart'].update('none');
    } else {
        charts['presChart'] = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'Druck', data: values, borderColor: '#a29bfe', backgroundColor: '#a29bfe22', fill: true, pointRadius: 0, tension: 0.3 }] },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                plugins: { legend: { display: false }, title: { display: true, text: 'Luftdruck (hPa)', color: '#fff' } },
                scales: { y: { grid: { color: '#333' }, ticks: { color: '#bbb' } }, x: { grid: { color: '#333' }, ticks: { color: '#bbb', maxTicksLimit: 6 } } }
            }
        });
    }
}

function renderRainChart(entriesR) {
    const ctx = document.getElementById('rainChart').getContext('2d');
    const labels = entriesR.map(e => e.date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }));
    const values = entriesR.map(e => e.value);

    const data = {
        labels,
        datasets: [{
            label: 'l/m²', data: values, tension: 0, pointRadius: 0, borderWidth: 2,
            segment: {
                borderColor: ctx => {
                    if (ctx.p0.parsed && ctx.p1.parsed) {
                        const diff = ctx.p1.parsed.y - ctx.p0.parsed.y;
                        return getColorByDiff(diff);
                    }
                    return '#00bcd4';
                }
            }
        }]
    };

    if (charts['rainChart']) {
        charts['rainChart'].data = data;
        charts['rainChart'].update('none');
    } else {
        charts['rainChart'] = new Chart(ctx, {
            type: 'line', data,
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                plugins: { legend: { display: false }, title: { display: true, text: 'Gesamt Regenmenge (l/m²)', color: '#fff' } },
                scales: { 
                    y: { grid: { color: '#333' }, ticks: { color: '#bbb' } }, 
                    x: { grid: { color: '#333' }, ticks: { color: '#bbb', maxTicksLimit: 6 } } 
                }
            }
        });
    }
}

fetchData();
setInterval(fetchData, 60000); // Jede Minute aktualisieren
</script>
</body>
</html>
