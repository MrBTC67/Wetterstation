<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetterdaten</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .stats { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .card { padding: 10px; border-left: 4px solid #00d1b2; background: #2a2a2a; border-radius: 5px; min-width: 100px; flex: 1; }
        .card.hum { border-left-color: #3273dc; }
        .card.pres { border-left-color: #a29bfe; }
        .chart-box { background: #2a2a2a; border-radius: 10px; padding: 10px; margin-bottom: 20px; }
        h3 { margin: 5px 0; font-size: 0.9em; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <div class="card">
            <h3>Temp Aktuell</h3>
            <strong id="curr-temp">--</strong> °C
        </div>
        <div class="card" style="border-left-color: #ff3860;">
            <h3>Temp Max</h3>
            <strong id="max-temp">--</strong> °C
        </div>
        <div class="card" style="border-left-color: #ffdd57;">
            <h3>Temp Min</h3>
            <strong id="min-temp">--</strong> °C
        </div>
        <div class="card hum">
            <h3>Feuchte</h3>
            <strong id="curr-hum">--</strong> %
        </div>
        <div class="card pres">
            <h3>Luftdruck</h3>
            <strong id="curr-pres">--</strong> hPa
        </div>
    </div>

    <div class="chart-box">
        <canvas id="tempChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="humChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="presChart"></canvas>
    </div>
</div>

<script>
const URL_T = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/temperature.json";
const URL_H = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/humidity.json";
const URL_P = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/pressure.json";

let chartT, chartH, chartP;

async function fetchData() {
    try {
        const [resT, resH, resP] = await Promise.all([fetch(URL_T), fetch(URL_H), fetch(URL_P)]);
        const dataT = await resT.json();
        const dataH = await resH.json();
        const dataP = await resP.json();
        
        if (dataT) {
            const valT = Object.values(dataT).map(e => e.value);
            const labT = Object.keys(dataT).map((_, i) => i + 1);
            document.getElementById('curr-temp').innerText = valT[valT.length-1].toFixed(1);
            document.getElementById('max-temp').innerText = Math.max(...valT).toFixed(1);
            document.getElementById('min-temp').innerText = Math.min(...valT).toFixed(1);
            chartT = updateChart('tempChart', chartT, labT, valT, 'Temperatur (°C)', '#00d1b2');
        }

        if (dataH) {
            const valH = Object.values(dataH).map(e => e.value);
            const labH = Object.keys(dataH).map((_, i) => i + 1);
            document.getElementById('curr-hum').innerText = valH[valH.length-1].toFixed(1);
            chartH = updateChart('humChart', chartH, labH, valH, 'Feuchtigkeit (%)', '#3273dc');
        }

        if (dataP) {
            const valP = Object.values(dataP).map(e => e.value);
            const labP = Object.keys(dataP).map((_, i) => i + 1);
            document.getElementById('curr-pres').innerText = valP[valP.length-1].toFixed(0);
            chartP = updateChart('presChart', chartP, labP, valP, 'Luftdruck (hPa)', '#a29bfe');
        }
    } catch (e) { console.error(e); }
}

function updateChart(id, chartObj, labels, data, label, color) {
    const ctx = document.getElementById(id).getContext('2d');
    if (chartObj) chartObj.destroy();
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: data,
                borderColor: color,
                backgroundColor: color + '22',
                fill: true,
                tension: 0.3,
                pointRadius: 1
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#fff' } } },
            scales: {
                y: { grid: { color: '#444' }, ticks: { color: '#ccc' } },
                x: { display: false }
            }
        }
    });
}

fetchData();
setInterval(fetchData, 300000);
</script>

</body>
</html>
