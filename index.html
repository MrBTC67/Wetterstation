<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetterstation Klaus</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 5px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .controls { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 0 5px; }
        .controls label { font-size: 0.85em; color: #aaa; }
        select { background: #2a2a2a; color: white; border: 1px solid #444; padding: 6px; border-radius: 5px; cursor: pointer; font-size: 13px; }

        /* Stats Optimierung für Mobile: Karten nebeneinander */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 15px; }
        .card { padding: 10px 5px; background: #2a2a2a; border-radius: 8px; border-top: 3px solid #00d1b2; transition: all 0.5s ease; }
        .card h3 { margin: 0 0 5px 0; font-size: 0.65em; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        
        .val-display { font-size: 1.1em; font-weight: bold; white-space: nowrap; }
        #temp-display { transition: color 0.5s ease; }
        .hum-text { color: #3273dc; }
        .pres-text { color: #a29bfe; }
        
        .card.hum { border-top-color: #3273dc; }
        .card.pres { border-top-color: #a29bfe; }

        .chart-box { background: #2a2a2a; border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid #333; height: 280px; }
        
        @media (min-width: 600px) {
            body { padding: 15px; }
            .container { padding: 20px; }
            .stats { gap: 15px; }
            .card { padding: 15px; border-top: 0; border-left: 5px solid #00d1b2; }
            .card.hum { border-left-color: #3273dc; }
            .card.pres { border-left-color: #a29bfe; }
            .val-display { font-size: 1.6em; }
            .card h3 { font-size: 0.8em; }
            .chart-box { height: 350px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <label for="period">Zeitraum</label>
        <select id="period" onchange="fetchData()">
            <option value="12">1 Std</option>
            <option value="48">4 Std</option>
            <option value="144">12 Std</option>
            <option value="288" selected>24 Std</option>
            <option value="2016">7 Tage</option>
            <option value="8640">1 Monat</option>
            <option value="0">Alles</option>
        </select>
    </div>

    <div class="stats">
        <div id="card-curr" class="card">
            <h3>Temp</h3>
            <div id="temp-display" class="val-display"><span id="curr-temp">--</span>°</div>
        </div>
        <div class="card hum">
            <h3>Feuchte</h3>
            <div class="val-display hum-text"><span id="curr-hum">--</span>%</div>
        </div>
        <div class="card pres">
            <h3>Druck</h3>
            <div class="val-display pres-text"><span id="curr-pres">--</span></div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="presChart"></canvas>
    </div>
</div>

<script>
const URL_T = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/temperature.json";
const URL_H = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/humidity.json";
const URL_P = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/pressure.json";

let charts = {};

function getTempColor(t) {
    if (t < 5) return '#00008B';
    if (t < 10) return '#40E0D0';
    if (t < 15) return '#006400';
    if (t < 20) return '#90EE90';
    if (t < 25) return '#FFA500';
    return '#FF0000';
}

const lineLabelPlugin = {
    id: 'lineLabels',
    afterDatasetsDraw(chart) {
        if (chart.canvas.id !== 'mainChart') return;
        const { ctx, chartArea: { right }, scales: { y } } = chart;
        ctx.save();
        ctx.font = 'bold 10px sans-serif';
        ctx.textBaseline = 'middle';
        
        chart.data.datasets.forEach((dataset) => {
            if (dataset.label === 'Max' || dataset.label === 'Min') {
                const val = dataset.data[0];
                const yPos = y.getPixelForValue(val);
                ctx.fillStyle = dataset.borderColor;
                const text = `${dataset.label}: ${val.toFixed(1)}°`;
                ctx.fillText(text, right - 70, yPos - 10);
            }
        });
        ctx.restore();
    }
};

async function fetchData() {
    const period = parseInt(document.getElementById('period').value);
    
    try {
        const [resT, resH, resP] = await Promise.all([fetch(URL_T), fetch(URL_H), fetch(URL_P)]);
        const dataT = await resT.json();
        const dataH = await resH.json();
        const dataP = await resP.json();

        let valT = [], valH = [], valP = [];

        if (dataT) {
            valT = Object.values(dataT).map(e => e.value);
            if (period > 0) valT = valT.slice(-period);
            const lastTemp = valT[valT.length-1];
            const dynamicColor = getTempColor(lastTemp);
            document.getElementById('curr-temp').innerText = lastTemp.toFixed(1);
            document.getElementById('temp-display').style.color = dynamicColor;
            document.getElementById('card-curr').style.borderTopColor = dynamicColor;
            // Desktop fallback color
            if(window.innerWidth >= 600) document.getElementById('card-curr').style.borderLeftColor = dynamicColor;
        }

        if (dataH) {
            valH = Object.values(dataH).map(e => e.value);
            if (period > 0) valH = valH.slice(-period);
            const lastHum = valH[valH.length-1];
            document.getElementById('curr-hum').innerText = lastHum.toFixed(1);
        }

        if (dataT && dataH) {
            const maxT = Math.max(...valT);
            const minT = Math.min(...valT);
            const lastTemp = valT[valT.length-1];
            const dynamicColor = getTempColor(lastTemp);

            const lastHum = valH[valH.length-1];
            const hMinData = Math.min(...valH);
            const hMaxData = Math.max(...valH);
            const hScaleMin = Math.min(hMinData, lastHum - 5);
            const hScaleMax = Math.max(hMaxData, lastHum + 5);

            const datasets = [
                {
                    label: 'Temp',
                    data: valT,
                    borderColor: dynamicColor,
                    backgroundColor: dynamicColor + '22',
                    fill: true,
                    tension: 0.3,
                    yAxisID: 'y',
                    pointRadius: 0
                },
                {
                    label: 'Hum',
                    data: valH,
                    borderColor: '#3273dc',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.3,
                    yAxisID: 'y1',
                    pointRadius: 0
                },
                {
                    label: 'Max',
                    data: Array(valT.length).fill(maxT),
                    borderColor: '#ff3860',
                    borderDash: [5, 5],
                    borderWidth: 1,
                    pointRadius: 0,
                    yAxisID: 'y'
                },
                {
                    label: 'Min',
                    data: Array(valT.length).fill(minT),
                    borderColor: '#ffdd57',
                    borderDash: [5, 5],
                    borderWidth: 1,
                    pointRadius: 0,
                    yAxisID: 'y'
                }
            ];
            renderMainChart(valT.map((_, i) => i + 1), datasets, hScaleMin, hScaleMax);
        }

        if (dataP) {
            valP = Object.values(dataP).map(e => e.value);
            if (period > 0) valP = valP.slice(-period);
            document.getElementById('curr-pres').innerText = valP[valP.length-1].toFixed(0);
            renderPresChart(valP.map((_, i) => i + 1), valP);
        }
    } catch (e) { console.error("Fehler:", e); }
}

function renderMainChart(labels, datasets, hMin, hMax) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (charts['mainChart']) {
        charts['mainChart'].data.labels = labels;
        charts['mainChart'].data.datasets = datasets;
        charts['mainChart'].options.scales.y1.min = Math.floor(hMin);
        charts['mainChart'].options.scales.y1.max = Math.ceil(hMax);
        charts['mainChart'].update('none');
    } else {
        charts['mainChart'] = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            plugins: [lineLabelPlugin],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        type: 'linear', position: 'left',
                        grid: { color: '#333' }, ticks: { color: '#aaa', font: { size: 10 } }
                    },
                    y1: { 
                        type: 'linear', position: 'right',
                        min: Math.floor(hMin), max: Math.ceil(hMax),
                        grid: { drawOnChartArea: false }, ticks: { color: '#3273dc', font: { size: 10 } }
                    },
                    x: { display: false }
                }
            }
        });
    }
}

function renderPresChart(labels, data) {
    const ctx = document.getElementById('presChart').getContext('2d');
    if (charts['presChart']) {
        charts['presChart'].data.labels = labels;
        charts['presChart'].data.datasets[0].data = data;
        charts['presChart'].update('none');
    } else {
        charts['presChart'] = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Druck',
                    data: data,
                    borderColor: '#a29bfe',
                    backgroundColor: '#a29bfe22',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa', font: { size: 10 } } },
                    x: { display: false }
                }
            }
        });
    }
}

fetchData();
setInterval(fetchData, 300000);
</script>

</body>
</html>
