<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetterstation Klaus</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .controls { margin-bottom: 20px; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        select { background: #2a2a2a; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        select:focus { border-color: #00d1b2; outline: none; }

        .stats { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .card { padding: 15px; background: #2a2a2a; border-radius: 8px; min-width: 150px; border-left: 5px solid #00d1b2; transition: all 0.5s ease; }
        .card h3 { margin: 0 0 5px 0; font-size: 0.8em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        .val-display { font-size: 1.8em; font-weight: bold; }
        #temp-display { transition: color 0.5s ease; }
        .hum-text { color: #3273dc; }
        .pres-text { color: #a29bfe; }
        
        .card.hum { border-left-color: #3273dc; }
        .card.pres { border-left-color: #a29bfe; }

        .chart-box { background: #2a2a2a; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        canvas { max-height: 350px; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <label for="period">Zeitraum:</label>
        <select id="period" onchange="fetchData()">
            <option value="12">1 Stunde</option>
            <option value="48">4 Stunden</option>
            <option value="144">12 Stunden</option>
            <option value="288" selected>24 Stunden</option>
            <option value="2016">7 Tage</option>
            <option value="8640">1 Monat</option>
            <option value="0">Alles</option>
        </select>
    </div>

    <div class="stats">
        <div id="card-curr" class="card">
            <h3>Temperatur</h3>
            <div id="temp-display" class="val-display"><span id="curr-temp">--</span> °C</div>
        </div>
        <div class="card hum">
            <h3>Feuchte</h3>
            <div class="val-display hum-text"><span id="curr-hum">--</span> %</div>
        </div>
        <div class="card pres">
            <h3>Luftdruck</h3>
            <div class="val-display pres-text"><span id="curr-pres">--</span> hPa</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="presChart"></canvas>
    </div>
</div>

<script>
const URL_T = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/temperature.json";
const URL_H = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/humidity.json";
const URL_P = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/pressure.json";

let charts = {};

function getTempColor(t) {
    if (t < 5) return '#00008B';
    if (t < 10) return '#40E0D0';
    if (t < 15) return '#006400';
    if (t < 20) return '#90EE90';
    if (t < 25) return '#FFA500';
    return '#FF0000';
}

const lineLabelPlugin = {
    id: 'lineLabels',
    afterDatasetsDraw(chart) {
        if (chart.canvas.id !== 'mainChart') return;
        const { ctx, chartArea: { right }, scales: { y } } = chart;
        ctx.save();
        ctx.font = 'bold 11px sans-serif';
        ctx.textBaseline = 'middle';
        
        chart.data.datasets.forEach((dataset) => {
            if (dataset.label === 'Max' || dataset.label === 'Min') {
                const val = dataset.data[0];
                const yPos = y.getPixelForValue(val);
                ctx.fillStyle = dataset.borderColor;
                const text = `${dataset.label.toUpperCase()}: ${val.toFixed(1)} °C`;
                ctx.fillText(text, right - 95, yPos - 12);
            }
        });
        ctx.restore();
    }
};

async function fetchData() {
    const period = parseInt(document.getElementById('period').value);
    
    try {
        const [resT, resH, resP] = await Promise.all([fetch(URL_T), fetch(URL_H), fetch(URL_P)]);
        const dataT = await resT.json();
        const dataH = await resH.json();
        const dataP = await resP.json();

        let valT = [], valH = [], valP = [];

        if (dataT) {
            valT = Object.values(dataT).map(e => e.value);
            if (period > 0) valT = valT.slice(-period);
            const lastTemp = valT[valT.length-1];
            const dynamicColor = getTempColor(lastTemp);
            document.getElementById('curr-temp').innerText = lastTemp.toFixed(1);
            document.getElementById('temp-display').style.color = dynamicColor;
            document.getElementById('card-curr').style.borderLeftColor = dynamicColor;
        }

        if (dataH) {
            valH = Object.values(dataH).map(e => e.value);
            if (period > 0) valH = valH.slice(-period);
            const lastHum = valH[valH.length-1];
            document.getElementById('curr-hum').innerText = lastHum.toFixed(1);
        }

        if (dataT && dataH) {
            const maxT = Math.max(...valT);
            const minT = Math.min(...valT);
            const lastTemp = valT[valT.length-1];
            const dynamicColor = getTempColor(lastTemp);

            // Autoscale Feuchte: +/- 5% Puffer um den aktuellen Wert
            const lastHum = valH[valH.length-1];
            const hMinData = Math.min(...valH);
            const hMaxData = Math.max(...valH);
            const hScaleMin = Math.min(hMinData, lastHum - 5);
            const hScaleMax = Math.max(hMaxData, lastHum + 5);

            const datasets = [
                {
                    label: 'Temperatur (°C)',
                    data: valT,
                    borderColor: dynamicColor,
                    backgroundColor: dynamicColor + '22',
                    fill: true,
                    tension: 0.3,
                    yAxisID: 'y',
                    pointRadius: period > 500 ? 0 : 1
                },
                {
                    label: 'Feuchtigkeit (%)',
                    data: valH,
                    borderColor: '#3273dc',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.3,
                    yAxisID: 'y1',
                    pointRadius: period > 500 ? 0 : 1
                },
                {
                    label: 'Max',
                    data: Array(valT.length).fill(maxT),
                    borderColor: '#ff3860',
                    borderDash: [5, 5],
                    borderWidth: 1,
                    pointRadius: 0,
                    yAxisID: 'y'
                },
                {
                    label: 'Min',
                    data: Array(valT.length).fill(minT),
                    borderColor: '#ffdd57',
                    borderDash: [5, 5],
                    borderWidth: 1,
                    pointRadius: 0,
                    yAxisID: 'y'
                }
            ];
            renderMainChart(valT.map((_, i) => i + 1), datasets, hScaleMin, hScaleMax);
        }

        if (dataP) {
            valP = Object.values(dataP).map(e => e.value);
            if (period > 0) valP = valP.slice(-period);
            document.getElementById('curr-pres').innerText = valP[valP.length-1].toFixed(0);
            renderPresChart(valP.map((_, i) => i + 1), valP);
        }
    } catch (e) { console.error("Fehler:", e); }
}

function renderMainChart(labels, datasets, hMin, hMax) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (charts['mainChart']) {
        charts['mainChart'].data.labels = labels;
        charts['mainChart'].data.datasets = datasets;
        charts['mainChart'].options.scales.y1.min = Math.floor(hMin);
        charts['mainChart'].options.scales.y1.max = Math.ceil(hMax);
        charts['mainChart'].update('none');
    } else {
        charts['mainChart'] = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            plugins: [lineLabelPlugin],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        type: 'linear', display: true, position: 'left',
                        grid: { color: '#333' }, ticks: { color: '#aaa' },
                        title: { display: true, text: 'Temp °C', color: '#00d1b2' }
                    },
                    y1: { 
                        type: 'linear', display: true, position: 'right',
                        min: Math.floor(hMin), max: Math.ceil(hMax),
                        grid: { drawOnChartArea: false }, ticks: { color: '#3273dc' },
                        title: { display: true, text: 'Feuchte %', color: '#3273dc' }
                    },
                    x: { display: false }
                }
            }
        });
    }
}

function renderPresChart(labels, data) {
    const ctx = document.getElementById('presChart').getContext('2d');
    if (charts['presChart']) {
        charts['presChart'].data.labels = labels;
        charts['presChart'].data.datasets[0].data = data;
        charts['presChart'].update('none');
    } else {
        charts['presChart'] = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Luftdruck (hPa)',
                    data: data,
                    borderColor: '#a29bfe',
                    backgroundColor: '#a29bfe22',
                    fill: true,
                    tension: 0.3,
                    pointRadius: labels.length > 500 ? 0 : 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa' }, title: { display: true, text: 'hPa', color: '#a29bfe' } },
                    x: { display: false }
                }
            }
        });
    }
}

fetchData();
setInterval(fetchData, 300000);
</script>

</body>
</html>
